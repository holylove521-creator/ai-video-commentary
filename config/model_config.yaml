# ============================================================
# AI 智能视频解说生成系统 - 全局模型与服务配置
# ============================================================

# ---- 视觉语言模型服务（Stage 1：视频理解）----
vl_server:
  model_path: models/Qwen2.5-VL-32B-Instruct-Q5_K_M.gguf
  mmproj_path: models/mmproj-Qwen2.5-VL-32B-Instruct-f16.gguf
  host: 127.0.0.1
  port: 8080
  n_gpu_layers: 999       # 全部层卸载 GPU
  ctx_size: 8192          # 上下文长度
  batch_size: 512
  parallel: 2             # 并发请求数

# ---- 文本大语言模型服务（Stage 2：脚本生成）----
script_server:
  model_path: models/Qwen2.5-32B-Instruct-Q5_K_M.gguf
  host: 127.0.0.1
  port: 8081
  n_gpu_layers: 999
  ctx_size: 16384         # 更大上下文以容纳长脚本
  batch_size: 1024
  parallel: 4
  mlock: true             # 锁定内存，防止换页

# ---- TTS 语音合成（Stage 3）----
tts:
  model_path: models/CosyVoice2-0.5B
  default_voice: zh-cn-female-1
  sample_rate: 22050
  max_concurrent: 4   # 最大并发数，充分利用多核/多卡

# ---- 语音识别（字幕时间戳对齐）----
whisper:
  model_size: large-v3
  device: cuda
  compute_type: float16

# ---- 视频处理参数 ----
video:
  fps_sample: 1.0             # 传统模式使用，两阶段模式下此项被场景检测替代
  frame_quality: 85           # JPEG 质量（0-100）
  fast_resize: [1280, 720]    # Phase 1 粗筛分辨率（720p）
  deep_resize: [1920, 1080]   # Phase 2 精分分辨率（1080p）
  max_concurrent_frames: 8    # Phase 1 VL-7B 并发数
  max_concurrent_deep: 2      # Phase 2 VL-32B 并发数
  max_concurrent: 8           # 总体最大并发（可被 CLI 覆盖）
  output_codec: h264_nvenc    # NVIDIA 硬件编码
  output_crf: 23              # 编码质量（越低质量越高）

# ---- 场景变化检测参数 ----
scene_detection:
  enabled: true               # true=两阶段流水线，false=传统逐帧
  threshold: 0.4              # 直方图差异阈值（0-1，越小越敏感）
  min_scene_gap: 2.0          # 最短场景间隔（秒），避免重复采样
  top_score_threshold: 7      # Phase 1 粗筛后，≥ 此分进入 32B 精分

# ---- 视觉语言模型快速粗筛服务（Stage 1 Phase 1，VL-7B）----
vl_server_fast:
  model_path: /path/to/models/Qwen2.5-VL-7B-Instruct-Q5_K_M.gguf  # ← 改为实际路径
  mmproj_path: /path/to/models/mmproj-Qwen2.5-VL-7B-f16.gguf       # ← 改为实际路径
  host: 0.0.0.0
  port: 8083
  n_gpu_layers: 999
  ctx_size: 4096
  batch_size: 512
  parallel: 8                 # 7B 模型 ~5.5GB，可跑 8 并发（48GB 显存安全）

# ---- 阶段化进程管理（48GB 显存约束）----
# Phase vl:     启动 vl_server + vl_server_fast（约 22GB + 5.5GB）
# Phase script: 关闭 vl 进程，启动 script_server（约 22GB）
# 由 services.server_manager.ServerManager 在运行时按 phase 切换。
phase_swap:
  enabled: true
  log_dir: /tmp

# ---- 字幕样式（被 movie.yaml 覆盖）----
subtitle_style:
  font_name: 微软雅黑
  font_size: 42
  primary_color: "&H00FFFFFF"
  outline_color: "&H00000000"

# ---- 路径配置 ----
paths:
  temp_dir: /tmp/ai_video_tmp
  output_dir: outputs
  models_dir: models
