# =============================================================
# AI 视频解说生成系统 - 配置文件
# 请将所有 /path/to/... 替换为你本地的实际路径
# =============================================================

# llama.cpp 可执行文件（已在本地编译好，直接填写绝对路径）
llamacpp:
  server_bin: /path/to/llama.cpp/build/bin/llama-server  # ← 必填：llama-server 可执行文件路径

# 视觉理解服务（Qwen2.5-VL，用于视频帧分析）
vl_server:
  model_path: /path/to/models/Qwen2.5-VL-32B-Instruct-Q5_K_M.gguf   # ← 必填
  mmproj_path: /path/to/models/mmproj-Qwen2.5-VL-32B-Instruct-f16.gguf  # ← 必填
  host: 0.0.0.0
  port: 8001
  n_gpu_layers: 999       # 全部层 offload 到 GPU
  ctx_size: 8192
  batch_size: 512
  parallel: 2             # 并发请求数

# 脚本生成服务（Qwen2.5-32B，用于解说脚本生成）
script_server:
  model_path: /path/to/models/Qwen2.5-32B-Instruct-Q5_K_M.gguf  # ← 必填
  host: 0.0.0.0
  port: 8002
  n_gpu_layers: 999
  ctx_size: 16384
  batch_size: 1024
  parallel: 4
  mlock: true             # 锁定内存，防止 swap

# TTS 语音合成（CosyVoice2）
tts:
  model_path: /path/to/models/CosyVoice2-0.5B  # ← 必填：CosyVoice2 模型目录
  default_voice: 中文女
  sample_rate: 22050

# Whisper 语音识别（用于字幕生成）
whisper:
  model_size: large-v3
  device: cuda
  compute_type: float16

# 视频处理参数
video:
  fps_sample: 1.0             # 传统模式使用，两阶段模式下此项被场景检测替代
  frame_quality: 85           # JPEG 质量（0-100）
  fast_resize: [1280, 720]    # Phase 1 粗筛分辨率（720p）
  deep_resize: [1920, 1080]   # Phase 2 精分分辨率（1080p）
  max_concurrent_frames: 8    # Phase 1 VL-7B 并发数
  max_concurrent_deep: 2      # Phase 2 VL-32B 并发数
  output_codec: h264_nvenc    # NVIDIA 硬件编码
  output_crf: 23              # 编码质量（越低质量越高）

# ---- 场景变化检测参数 ----
scene_detection:
  enabled: true               # true=两阶段流水线，false=传统逐帧
  threshold: 0.4              # 直方图差异阈值（0-1，越小越敏感）
  min_scene_gap: 2.0          # 最短场景间隔（秒），避免重复采样
  top_score_threshold: 7      # Phase 1 粗筛后，≥ 此分进入 32B 精分

# ---- 视觉语言模型快速粗筛服务（Stage 1 Phase 1，VL-7B）----
vl_server_fast:
  model_path: /path/to/models/Qwen2.5-VL-7B-Instruct-Q5_K_M.gguf  # ← 改为实际路径
  mmproj_path: /path/to/models/mmproj-Qwen2.5-VL-7B-f16.gguf       # ← 改为实际路径
  host: 0.0.0.0
  port: 8083
  n_gpu_layers: 999
  ctx_size: 4096
  batch_size: 512
  parallel: 8                 # 7B 模型 ~5.5GB，可跑 8 并发（48GB 显存安全）

# 路径配置
paths:
  temp_dir: /tmp/ai_video_commentary   # 临时文件目录
  output_dir: ./output                 # 输出视频目录
  models_dir: /path/to/models          # 模型根目录（仅供参考，实际路径以上面各项为准）
