# ============================================================
# AI 智能视频解说生成系统 - 全局模型与服务配置
# ============================================================

# ---- 视觉语言模型服务（Stage 1：视频理解）----
vl_server:
  model_path: models/Qwen2.5-VL-32B-Instruct-Q5_K_M.gguf
  mmproj_path: models/Qwen2.5-VL-32B-Instruct-mmproj-f16.gguf
  host: 127.0.0.1
  port: 8080
  n_gpu_layers: 999       # 全部层卸载 GPU
  ctx_size: 8192          # 上下文长度
  batch_size: 512
  parallel: 2             # 并发请求数

# ---- 文本大语言模型服务（Stage 2：脚本生成）----
script_server:
  model_path: models/Qwen2.5-32B-Instruct-Q5_K_M.gguf
  host: 127.0.0.1
  port: 8081
  n_gpu_layers: 999
  ctx_size: 16384         # 更大上下文以容纳长脚本
  batch_size: 1024
  parallel: 4
  mlock: true             # 锁定内存，防止换页

# ---- TTS 语音合成（Stage 3）----
tts:
  model_path: models/CosyVoice2-0.5B
  default_voice: zh-cn-female-1
  sample_rate: 22050

# ---- 语音识别（字幕时间戳对齐）----
whisper:
  model_size: large-v3
  device: cuda
  compute_type: float16

# ---- 视频处理参数 ----
video:
  fps_sample: 1.0         # 抽帧频率（帧/秒）
  frame_quality: 85       # JPEG 质量（0-100）
  max_concurrent_frames: 4  # 并发 VL 推理帧数
  output_codec: h264_nvenc  # NVIDIA 硬件编码
  output_crf: 23          # 编码质量（越低质量越高）

# ---- 路径配置 ----
paths:
  temp_dir: /tmp/ai_video_tmp
  output_dir: outputs
  models_dir: models
